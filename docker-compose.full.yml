# Full two-container stack: Postgres (df + pgmq) + the pgflows Python app.
#
#   docker build -t pgflows-e2e-dfpgmq:latest tests/e2e/docker   # DB image (once)
#   docker compose -f docker-compose.full.yml up --build
#
# Then: curl localhost:8000/health
#       curl -XPOST localhost:8000/pgflows/workflows/greet_workflow/start \
#            -H 'content-type: application/json' -d '{"input":{"name":"ada"}}'
services:
  postgres:
    image: pgflows-e2e-dfpgmq:latest
    environment:
      POSTGRES_USER: pgflows
      POSTGRES_PASSWORD: pgflows
      POSTGRES_DB: pgflows_test
    ports:
      - "5433:5432"
    command: >
      postgres
      -c shared_preload_libraries=pg_durable
      -c pg_durable.database=pgflows_test
      -c pg_durable.worker_role=pgflows
      -c pg_durable.enable_superuser_instances=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgflows -d pgflows_test"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    environment:
      PGFLOWS_DSN: postgresql://pgflows:pgflows@postgres:5432/pgflows_test
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

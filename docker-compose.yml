services:
  postgres:
    image: quay.io/tembo/pg17-pgmq:latest
    environment:
      POSTGRES_USER: pyflows
      POSTGRES_PASSWORD: pyflows
      POSTGRES_DB: pyflows_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyflows -d pyflows_test"]
      interval: 5s
      timeout: 5s
      retries: 10

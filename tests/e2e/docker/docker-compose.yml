# Live e2e database: Postgres 18 with pg_durable (df), pgmq, AND pg_cron.
# Build the image first:  docker build -t pgflows-e2e-dfpgmq:latest tests/e2e/docker
# Then:                    docker compose -f tests/e2e/docker/docker-compose.yml up -d --wait
services:
  postgres:
    image: pgflows-e2e-dfpgmq:latest
    container_name: pgflows-e2e-dfpgmq
    environment:
      POSTGRES_USER: pgflows
      POSTGRES_PASSWORD: pgflows
      POSTGRES_DB: pgflows_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgflows -d pgflows_test"]
      interval: 5s
      timeout: 5s
      retries: 20
